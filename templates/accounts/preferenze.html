{% extends "base.html" %}
{% block title %}Preferenze — StudioHub{% endblock %}

{% block content %}
<div class="mx-auto max-w-lg">
    <h1 class="mb-4 text-lg font-semibold">Preferenze utente</h1>
    <form method="post" class="space-y-3 rounded-md border border-slate-200 bg-white p-4 dark:border-slate-800 dark:bg-slate-900">
        {% csrf_token %}
        <div>
            <label class="block text-xs text-slate-500 dark:text-slate-400">Tema</label>
            <select name="tema" class="mt-1 w-full rounded-md border border-slate-300 bg-white px-2 py-1 text-sm dark:border-slate-700 dark:bg-slate-800">
                <option value="light"  {% if user.tema == 'light' %}selected{% endif %}>Chiaro</option>
                <option value="dark"   {% if user.tema == 'dark'  %}selected{% endif %}>Scuro</option>
                <option value="auto"   {% if user.tema == 'auto'  %}selected{% endif %}>Auto (sistema)</option>
            </select>
        </div>
        <div>
            <label class="block text-xs text-slate-500 dark:text-slate-400">Densità UI</label>
            <select name="densita_ui" class="mt-1 w-full rounded-md border border-slate-300 bg-white px-2 py-1 text-sm dark:border-slate-700 dark:bg-slate-800">
                <option value="compatta" {% if user.densita_ui == 'compatta' %}selected{% endif %}>Compatta</option>
                <option value="standard" {% if user.densita_ui == 'standard' %}selected{% endif %}>Standard</option>
            </select>
        </div>
        <button type="submit" class="rounded-md bg-brand-600 px-3 py-1.5 text-sm font-medium text-white hover:bg-brand-700">Salva</button>
    </form>
</div>
{% endblock %}
