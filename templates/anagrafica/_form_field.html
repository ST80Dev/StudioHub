{# Rendering compatto di un singolo campo del form. #}
<div>
  <label for="{{ f.id_for_label }}" class="block text-xs font-medium mb-1 text-slate-600 dark:text-slate-300">
    {{ f.label }}{% if f.field.required %} <span class="text-red-600">*</span>{% endif %}
  </label>
  {{ f }}
  {% if f.help_text %}
    <p class="mt-1 text-[11px] text-slate-400">{{ f.help_text }}</p>
  {% endif %}
  {% if f.errors %}
    <p class="mt-1 text-[11px] text-red-600">{{ f.errors|join:", " }}</p>
  {% endif %}
</div>
