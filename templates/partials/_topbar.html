{% load static %}
<header class="flex h-12 items-center justify-between border-b border-slate-200 bg-white px-4 dark:border-slate-800 dark:bg-slate-900">
    <div class="flex flex-1 items-center gap-3">
        <form action="{% url 'anagrafica:list' %}" method="get" class="relative w-full max-w-md">
            <input type="text"
                   name="q"
                   placeholder="Cerca cliente (denominazione, CF, P.IVA, codice)…"
                   class="w-full rounded-md border border-slate-200 bg-slate-50 px-3 py-1.5 text-sm placeholder-slate-400 focus:border-brand-500 focus:bg-white focus:outline-none focus:ring-1 focus:ring-brand-500 dark:border-slate-700 dark:bg-slate-800 dark:focus:bg-slate-900">
        </form>
    </div>

    <div class="flex items-center gap-2">
        {% include "partials/_theme_toggle.html" %}
        <div class="relative" x-data="{ open: false }" @click.outside="open = false">
            <button @click="open = !open"
                    class="flex items-center gap-2 rounded-md px-2 py-1 text-sm hover:bg-slate-100 dark:hover:bg-slate-800">
                <span class="inline-flex h-7 w-7 items-center justify-center rounded-full bg-brand-600 text-xs font-semibold text-white">
                    {{ user.first_name.0|default:user.username.0|upper }}{{ user.last_name.0|upper }}
                </span>
                <span class="hidden sm:block">{{ user.get_full_name|default:user.username }}</span>
                <span aria-hidden="true">▾</span>
            </button>
            <div x-show="open"
                 x-transition
                 class="absolute right-0 z-10 mt-1 w-48 rounded-md border border-slate-200 bg-white py-1 shadow-lg dark:border-slate-700 dark:bg-slate-900"
                 style="display:none">
                <a href="{% url 'accounts:preferenze' %}" class="block px-3 py-1.5 text-sm hover:bg-slate-100 dark:hover:bg-slate-800">Preferenze</a>
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="block w-full px-3 py-1.5 text-left text-sm hover:bg-slate-100 dark:hover:bg-slate-800">Esci</button>
                </form>
            </div>
        </div>
    </div>
</header>
