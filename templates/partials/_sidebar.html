{% load static %}
<aside class="flex w-56 shrink-0 flex-col border-r border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900">
    <div class="flex h-12 items-center border-b border-slate-200 px-4 dark:border-slate-800">
        <a href="{% url 'core:home' %}" class="flex items-center gap-2 font-semibold tracking-tight">
            <span class="inline-flex h-6 w-6 items-center justify-center rounded bg-brand-600 text-[11px] font-bold text-white">SH</span>
            <span>StudioHub</span>
        </a>
    </div>
    <nav class="flex-1 overflow-y-auto py-2 text-sm">
        {% with path=request.path %}
        <a href="{% url 'core:home' %}"
           class="flex items-center gap-2 px-4 py-2 hover:bg-slate-100 dark:hover:bg-slate-800
                  {% if path == '/' %}bg-slate-100 font-medium text-brand-700 dark:bg-slate-800 dark:text-brand-500{% endif %}">
            <span aria-hidden="true">🏠</span> Home
        </a>
        <a href="{% url 'anagrafica:list' %}"
           class="flex items-center gap-2 px-4 py-2 hover:bg-slate-100 dark:hover:bg-slate-800
                  {% if '/clienti/' in path %}bg-slate-100 font-medium text-brand-700 dark:bg-slate-800 dark:text-brand-500{% endif %}">
            <span aria-hidden="true">👥</span> Clienti
        </a>
        <a href="{% url 'adempimenti:list' %}"
           class="flex items-center gap-2 px-4 py-2 hover:bg-slate-100 dark:hover:bg-slate-800
                  {% if '/adempimenti/' in path %}bg-slate-100 font-medium text-brand-700 dark:bg-slate-800 dark:text-brand-500{% endif %}">
            <span aria-hidden="true">📋</span> Adempimenti
        </a>
        <div class="mt-6 px-4 text-[11px] uppercase tracking-wider text-slate-400">In arrivo</div>
        <span class="flex items-center gap-2 px-4 py-2 text-slate-400">
            <span aria-hidden="true">📅</span> Calendario
        </span>
        <span class="flex items-center gap-2 px-4 py-2 text-slate-400">
            <span aria-hidden="true">📊</span> Report
        </span>
        {% if user.is_staff %}
        <div class="mt-6 px-4 text-[11px] uppercase tracking-wider text-slate-400">Amministrazione</div>
        <a href="/admin/"
           class="flex items-center gap-2 px-4 py-2 hover:bg-slate-100 dark:hover:bg-slate-800">
            <span aria-hidden="true">⚙️</span> Admin Django
        </a>
        {% endif %}
        {% endwith %}
    </nav>
    <div class="border-t border-slate-200 px-4 py-2 text-[11px] text-slate-400 dark:border-slate-800">
        v0.1 · on-prem
    </div>
</aside>
