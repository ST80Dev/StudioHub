{% if stato == 'inviato' %}
    <span class="sh-state sh-state-done">Inviato</span>
{% elif stato == 'controllato' %}
    <span class="sh-state sh-state-review">Controllato</span>
{% elif stato == 'in_corso' %}
    <span class="sh-state sh-state-wip">In corso</span>
{% elif stato == 'da_fare' %}
    <span class="sh-state sh-state-todo">Da fare</span>
{% else %}
    <span class="sh-state sh-state-idle">{{ stato }}</span>
{% endif %}
